function showStatus(msg, type='info'){
  const el=document.getElementById('status');
  el.className='status '+type;
  el.textContent=msg;
  el.style.display='block';
}

async function migrate(){
  const apiUrl=document.getElementById('apiUrl').value.trim();
  const pass=document.getElementById('adminPass').value.trim();
  if(!apiUrl||!pass){ showStatus('請填寫 API 網址和管理員密碼','err'); return; }

  const btn=document.getElementById('migrateBtn');
  btn.disabled=true; btn.textContent='遷移中...';
  showStatus('正在遷移職類和項目...','info');

  try{
    // 分批寫入：先寫職類和項目
    const dataStr=encodeURIComponent(JSON.stringify({
      depts: MIGRATION_DATA.depts,
      items: MIGRATION_DATA.items,
      statusMap: MIGRATION_DATA.statusMap
    }));
    const url=apiUrl+'?'+new URLSearchParams({action:'write', pass, data:dataStr});
    const r=await fetch(url);
    const result=await r.json();

    if(result.error){
      showStatus('遷移失敗：'+result.error,'err');
    } else {
      showStatus(`✅ 遷移成功！已寫入 ${MIGRATION_DATA.items.length} 個項目、${MIGRATION_DATA.depts.length} 個職類、${Object.keys(MIGRATION_DATA.statusMap).length} 筆狀態。\n\n請重新整理你的追蹤系統頁面。`,'ok');
    }
  }catch(e){
    showStatus('錯誤：'+e.message,'err');
  }
  btn.disabled=false; btn.textContent='🚀 開始遷移';
}
</script>
